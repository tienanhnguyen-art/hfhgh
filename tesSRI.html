<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Smart Flashcards - SRI Demo</title>

<style>
:root {
    --bg-gradient: linear-gradient(120deg, #e0ffe0, #e0e0ff);
    --heading-color: #2c3e50;
    --text-main: #333;
    --text-sub: #888;
    --text-pos: #555;
    --card-bg: #ffffff;
    --input-bg: #ffffff;
    --border-color: #ccc;
    --shadow-color: rgba(0,0,0,0.08);
    --icon-theme: #333;
    --btn-primary: #3498db;
    --btn-primary-hover: #2980b9;
}

[data-theme="dark"] {
    --bg-gradient: linear-gradient(120deg, #1a1a2e, #16213e);
    --heading-color: #e0e0e0;
    --text-main: #f5f5f5;
    --text-sub: #aaaaaa;
    --text-pos: #cccccc;
    --card-bg: #2a2a40;
    --input-bg: #1f1f33;
    --border-color: #444;
    --shadow-color: rgba(0,0,0,0.4);
    --icon-theme: #f5f5f5;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg-gradient); 
    color: var(--text-main);
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    transition: background 0.5s ease, color 0.5s ease;
    box-sizing: border-box;
}

h1 {
    color: var(--heading-color);
    transition: color 0.5s ease;
    margin-top: 40px;
    text-align: center;
}

.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: 50%;
    width: 48px;
    height: 48px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px var(--shadow-color);
    transition: all 0.3s ease;
    z-index: 1000;
}
.theme-toggle:hover { transform: scale(1.1); }
.theme-toggle svg { width: 24px; height: 24px; fill: var(--icon-theme); transition: all 0.3s ease; }

.sun-icon { display: none; }
.moon-icon { display: block; }
[data-theme="dark"] .sun-icon { display: block; }
[data-theme="dark"] .moon-icon { display: none; }

.search-box { width: 100%; max-width: 600px; margin-bottom: 15px; }
.search-box input {
    width: 100%; padding: 12px 15px; border-radius: 10px;
    border: 2px solid var(--border-color); background: var(--input-bg);
    color: var(--text-main); box-sizing: border-box; font-size: 1rem; transition: all 0.3s ease;
}
.search-box input:focus { outline: none; border-color: var(--btn-primary); }

.add-box { display: flex; flex-wrap: wrap; gap: 8px; max-width: 600px; margin-bottom: 15px; width: 100%; }
.add-box input {
    padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);
    background: var(--input-bg); color: var(--text-main); flex: 1;
    min-width: calc(50% - 10px); box-sizing: border-box; transition: all 0.3s ease;
}
.add-box input:focus { outline: none; border-color: var(--btn-primary); }
.add-box button {
    padding: 10px 14px; border: none; border-radius: 8px; background: var(--btn-primary);
    color: white; cursor: pointer; font-weight: bold; flex: 1; min-width: 100%; transition: background 0.3s ease;
}
.add-box button:hover { background: var(--btn-primary-hover); }

.backup-box { position: fixed; top: 20px; left: 20px; display: flex; gap: 8px; z-index: 1000; }
.backup-box button {
    width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--border-color);
    background: var(--card-bg); color: var(--text-main); font-size: 18px; cursor: pointer;
    box-shadow: 0 4px 12px var(--shadow-color); transition: transform 0.2s;
}
.backup-box button:hover { transform: scale(1.1); }

.voice-select { margin-bottom: 20px; width: 100%; max-width: 600px; }
.voice-select select {
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);
    background: var(--input-bg); color: var(--text-main); font-size: 1rem;
}

.flashcard-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px; width: 100%; max-width: 1200px; padding-bottom: 40px;
}
.flashcard-container { position: relative; aspect-ratio: 5/4; perspective: 1000px; }
.card { position: absolute; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    border-radius: 16px; box-shadow: 0 4px 12px var(--shadow-color); background: var(--card-bg);
    text-align: center; padding: 15px; box-sizing: border-box; transition: background 0.5s ease, box-shadow 0.5s ease;
}
.card-back { transform: rotateY(180deg); background: var(--card-bg); }
.english-word { font-size: 1.3rem; font-weight: bold; color: var(--text-main); margin-bottom: 10px; transition: color 0.5s ease; }
.IPA { color: var(--text-sub); font-size: 0.95rem; transition: color 0.5s ease; }
.pos { font-weight: bold; font-size: 0.85rem; margin-top: 6px; color: var(--text-pos); transition: color 0.5s ease; }
.meaning { margin-top: 8px; font-size: 1rem; color: var(--text-main); transition: color 0.5s ease; }
.speak { border: none; background: none; font-size: 22px; cursor: pointer; color: var(--btn-primary); padding: 5px; transition: transform 0.2s; }
.speak:hover { transform: scale(1.2); }
.delete-x { position: absolute; top: 10px; right: 15px; font-size: 18px; cursor: pointer; color: var(--border-color); font-weight: bold; transition: color 0.2s; padding: 5px; }
.delete-x:hover { color: #e74c3c; }

#sri-alert {
    width: 100%; max-width: 600px; padding: 12px; margin-bottom: 15px;
    border-radius: 8px; text-align: center; font-weight: bold; display: none;
}

@media (min-width: 600px) { .add-box input { min-width: 120px; } .add-box button { flex: unset; min-width: 100px; } }
</style>
</head>

<body>
<div id="sri-alert"></div>
<button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode" title="Bật/Tắt Giao diện Tối">
    <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18.75a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25a.75.75 0 01.75-.75zM6.166 18.894a.75.75 0 001.06 1.06l1.59-1.591a.75.75 0 10-1.06-1.061l-1.591 1.59zM4.5 12a.75.75 0 01-.75.75H1.5a.75.75 0 010-1.5h2.25a.75.75 0 01.75.75zM6.166 5.106a.75.75 0 00-1.06 1.06l1.591 1.59a.75.75 0 101.06-1.061l-1.59-1.59z" /></svg>
    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" /></svg>
</button>

<h1>Smart Flashcards</h1>

<div class="search-box">
<input id="searchInput" placeholder="Tìm kiếm từ vựng, phiên âm hoặc nghĩa..." autocomplete="off">
</div>

<div class="add-box">
<input id="newWord" placeholder="Word (Từ)" autocomplete="off">
<input id="newIPA" placeholder="IPA (Phiên âm)" autocomplete="off">
<input id="newPOS" placeholder="POS (Từ loại)" autocomplete="off">
<input id="newMeaning" placeholder="Meaning (Nghĩa)" autocomplete="off">
<button onclick="window.addWord ? addWord() : alert('Script chưa được tải hoặc bị SRI chặn!')">Thêm từ</button>
</div>

<div class="backup-box">
    <button title="Sao lưu dữ liệu (Backup)" onclick="window.exportData ? exportData() : alert('Chức năng chưa sẵn sàng!')">💾</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)" accept=".json">
    <button title="Phục hồi dữ liệu (Restore)" onclick="document.getElementById('importFile').click()">📂</button>
</div>

<div class="voice-select">
<select id="voiceSelect" aria-label="Chọn giọng đọc"></select>
</div>

<div class="flashcard-grid" id="grid"></div>

<script
    src="./App.js"
    integrity="sha384-xJwS7m9BvOd+HkWruJ/1ER2XViW/SzIrDQS+3eYucHvuckGVVuPdMJi+L6ZewArH"
    crossorigin="anonymous">
</script>

<script>
    const toggleBtn = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    toggleBtn.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        let newTheme = theme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    });

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const alertBox = document.getElementById('sri-alert');
            alertBox.style.display = 'block';
            if (window.flashcardAppLoaded) {
                alertBox.style.backgroundColor = '#d4edda';
                alertBox.style.color = '#155724';
                alertBox.style.border = '1px solid #c3e6cb';
                alertBox.innerHTML = '✅ Khớp mã SRI: Toàn bộ chức năng từ CDN đã tải an toàn!';
            } else {
                alertBox.style.backgroundColor = '#f8d7da';
                alertBox.style.color = '#721c24';
                alertBox.style.border = '1px solid #f5c6cb';
                alertBox.innerHTML = '❌ Lỗi SRI: File CDN bị chỉnh sửa nội dung hoặc sai mã băm! Trình duyệt đã chặn đứng file.';
            }
        }, 200);
    });
</script>
</body>
</html>
